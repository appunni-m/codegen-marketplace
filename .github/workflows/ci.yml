name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CI:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is read from package.json#packageManager — do not duplicate here

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugins
        run: pnpm build

      - name: Verify the tree is clean after build (freshness)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty after 'pnpm build'. Run 'pnpm build' locally and commit the regenerated artifacts."
            git status --porcelain
            git --no-pager diff
            exit 1
          fi

      - name: Validate plugins and scripts
        run: pnpm check
